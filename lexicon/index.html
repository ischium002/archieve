<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEXICON · 设定词条馆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS（对齐主站）
═══════════════════════════════════════════ */
:root {
  --bg:     #f7f4ee;
  --bg2:    #efebe3;
  --ink:    #181814;
  --ink2:   #5a574e;
  --ink3:   #9a9590;
  --rule:   #d8d2c4;
  --card:   #fbf8f1;
  --brass:  #8a6c2a;   /* = 主站 --md */
  --stamp:  #9c3a2e;   /* 对齐 ephemera 印章红 */
  --hollow: #e6e1d4;   /* 抽屉内膛 */
  --mono:   'DM Mono', monospace;
  --serif:  'Cormorant Garamond', 'Noto Serif SC', serif;
  --lh:     28px;      /* 抽出态格线行高 */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  min-height: 100vh;
  overflow-x: hidden;
  padding: 2rem 1rem 4rem;
  -webkit-tap-highlight-color: transparent;
}
body.locked { overflow: hidden; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }

/* ═══════════════════════════════════════════
   页头
═══════════════════════════════════════════ */
.lex-head { max-width: 640px; margin: 0 auto 2rem; }
.lex-back {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  color: var(--ink3);
  text-decoration: none;
}
.lex-back:hover { color: var(--ink); }
.lex-title-row { display: flex; align-items: baseline; gap: 0.8rem; margin-top: 1.2rem; }
.lex-title { font-size: 1.7rem; font-weight: 600; letter-spacing: 0.06em; }
.lex-title-en {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.22em;
  color: var(--brass);
}
.lex-sub {
  margin-top: 0.4rem;
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--ink3);
}

/* ═══════════════════════════════════════════
   目录柜：柜体
═══════════════════════════════════════════ */
.cabinet {
  max-width: 640px;
  margin: 0 auto;
  border: 1px solid var(--ink);
}
.cabinet-plate {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.6rem 1.1rem;
  border-bottom: 1px solid var(--ink);
  background: var(--bg);
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.24em;
  color: var(--ink2);
}
.cabinet-plate .r { color: var(--ink3); letter-spacing: 0.14em; }
.plate-find {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.24em;
  color: var(--ink3);
  padding: 0;
}
.plate-find:hover { color: var(--ink); }
.plate-find.on { color: var(--brass); }

/* ── 柜内检索（隐藏式查卡屉） ── */
.cabinet-search-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.35s ease;
}
.cabinet-search-wrap.show { grid-template-rows: 1fr; }
.cabinet-search-clip { overflow: hidden; min-height: 0; }
.cabinet-search {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
  padding: 0.55rem 1.1rem;
  border-bottom: 1px solid var(--ink);
  background: var(--bg);
}
.cabinet-search label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.24em;
  color: var(--ink3);
}
.cabinet-search input {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--ink);
  background: none;
  border: none;
  border-bottom: 1px dotted var(--rule);
  padding: 0.1rem 0;
  outline: none;
}
.cabinet-search input:focus { border-bottom-color: var(--brass); }
.cabinet-search input::placeholder { color: var(--ink3); }
.drawer.mute .drawer-face { opacity: 0.35; }
.lex-card.dim { opacity: 0.22; pointer-events: none; }

/* ── 单只抽屉 ── */
.drawer { border-top: 1px solid var(--ink); }
.drawer:first-of-type { border-top: none; }

/* 抽屉面板 */
.drawer-face {
  position: relative;
  width: 100%;
  text-align: left;
  display: flex;
  align-items: baseline;
  gap: 1.1rem;
  padding: 1.15rem 1.3rem;
  background: var(--bg2);
  transition: background 0.2s ease;
}
.drawer-face:hover { background: var(--hollow); }
.drawer.open .drawer-face { background: var(--bg); }
.face-spacer { flex: 1; min-width: 24px; }
.face-cat {
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  white-space: nowrap;
}
.face-meta {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.16em;
  color: var(--ink3);
  white-space: nowrap;
}
.drawer-pull {  /* 目录柜杯式拉手：厚背板＋弧形指扣 */
  align-self: center;
  width: 54px; height: 16px;
  border: 1.5px solid var(--brass);
  border-top-width: 5px;
  border-radius: 1px 1px 9px 9px;
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.drawer-face:hover .drawer-pull { transform: translateY(1px); }

/* ── 抽屉内膛：拉开后在面板上方展开 ── */
.drawer-tray {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.55s cubic-bezier(0.22, 1, 0.3, 1);
}
.drawer.open .drawer-tray { grid-template-rows: 1fr; }
.drawer.no-anim .drawer-tray { transition: none; }
.tray-clip { overflow: hidden; min-height: 0; }
.tray-in {
  background: var(--hollow);
  border-top: 1px solid var(--rule);
  padding: 1.5rem 1.1rem 0;
}

/* ── 立在抽屉里的索引卡 ── */
.lex-card {
  position: relative;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
  width: 100%;
  height: 5rem;
  padding: 0.66rem 1.05rem 0;
  background: var(--card);
  border: 1px solid var(--ink3);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  text-align: left;
  transition: transform 0.18s ease, border-color 0.18s ease;
}
.lex-card::before {  /* 卡头红线：索引卡制式 */
  content: '';
  position: absolute; left: 0.7rem; right: 0.7rem; top: 1.85rem;
  border-top: 1px solid rgba(156,58,46,0.42);
}
.lex-card + .lex-card { margin-top: -2.9rem; }
.lex-card.draft {
  border-style: dashed;
  border-color: var(--rule);
  background: var(--bg2);
  cursor: default;
}
.lex-card.draft .lex-card-term { color: var(--ink3); font-style: italic; }
.lex-card.draft:hover { transform: translateY(-6px); border-color: var(--ink3); z-index: 30; }
.lex-card-tag {
  font-family: var(--mono);
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  color: var(--ink3);
  border: 1px solid var(--rule);
  padding: 0.08rem 0.4rem;
  flex-shrink: 0;
  white-space: nowrap;
}
.lex-card:hover:not(.draft), .lex-card:focus-visible {
  transform: translateY(-13px);
  border-color: var(--ink);
  z-index: 30;
  outline: none;
}
.lex-card-term {
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lex-card-num {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: var(--ink3);
  flex-shrink: 0;
  white-space: nowrap;
}

/* 抽屉底：压卡横杆 */
.tray-rod {
  position: relative;
  z-index: 40;
  height: 0;
  border-top: 2px solid var(--brass);
  margin: 0 -1.1rem;
}

.lex-foot {
  max-width: 640px;
  margin: 1.4rem auto 0;
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  color: var(--ink3);
  text-align: center;
}

/* ═══════════════════════════════════════════
   抽出态 overlay
═══════════════════════════════════════════ */
.lex-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: none;
  background: rgba(24,24,20,0.38);
  overflow-y: auto;
  padding: 3rem 1rem 4rem;
}
.lex-overlay.show { display: block; }

.lex-pulled {
  position: relative;
  width: min(560px, 100%);
  margin: 0 auto;
  background: var(--card);
  border: 1px solid var(--ink2);
  border-radius: 6px 6px 0 0;
  padding: 1.8rem 2.2rem 3.4rem;
  animation: pullOut 0.32s ease;
}
@keyframes pullOut {
  from { transform: translateY(46px) rotate(0.5deg); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
@keyframes pushBack {
  from { transform: none; opacity: 1; }
  to   { transform: translateY(46px) rotate(-0.4deg); opacity: 0; }
}
.lex-pulled.swap-out { animation: pushBack 0.2s ease forwards; }
.lex-pulled.swap-in  { animation: pullOut 0.3s ease; }

.pulled-close {
  position: absolute; top: 0.5rem; right: 0.7rem;
  font-family: var(--mono);
  font-size: 1rem;
  color: var(--ink3);
  padding: 0.3rem 0.5rem;
}
.pulled-close:hover { color: var(--ink); }

.pulled-num {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  color: var(--ink3);
}
.pulled-head {
  border-bottom: 1px solid rgba(156,58,46,0.5);  /* 目录卡红头线 */
  padding: 0.5rem 0 0.7rem;
  margin-bottom: 0;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.pulled-term { font-size: 1.55rem; font-weight: 600; letter-spacing: 0.05em; }
.pulled-sub {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  color: var(--ink3);
}
.pulled-stamp {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.24em;
  color: var(--stamp);
  border: 1px solid var(--stamp);
  padding: 0.25rem 0.6rem 0.25rem 0.8rem;
  transform: rotate(-4deg);
  opacity: 0.85;
  flex-shrink: 0;
}

/* 格线区：行高与横线同步 */
.pulled-body {
  background: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent calc(var(--lh) - 1px),
    var(--rule) calc(var(--lh) - 1px),
    var(--rule) var(--lh)
  );
  background-origin: content-box;
  background-clip: content-box;
  padding-top: calc(var(--lh) * 0.5);
  min-height: calc(var(--lh) * 4);
}
.pulled-def { font-size: 0.95rem; line-height: var(--lh); }
.pulled-note {
  margin-top: var(--lh);
  font-size: 0.9rem;
  line-height: var(--lh);
  font-style: italic;
  color: var(--ink3);
}
.pulled-note::before { content: '\270E  '; }

.pulled-see {
  margin-top: 1.6rem;
  padding-top: 0.8rem;
  border-top: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--ink3);
  display: flex;
  align-items: baseline;
  gap: 0.9rem;
  flex-wrap: wrap;
}
.pulled-see-link {
  color: var(--ink2);
  border-bottom: 1px dotted var(--ink3);
  padding: 0;
  letter-spacing: 0.1em;
  font-family: var(--mono);
  font-size: 0.62rem;
}
.pulled-see-link:hover { color: var(--ink); border-bottom-color: var(--ink); }
.pulled-see-dead { color: var(--ink3); }

/* 相邻翻阅 */
.pulled-nav {
  display: flex;
  justify-content: space-between;
  gap: 2.5rem;
  margin-top: 1.5rem;
}
.pulled-nav-btn {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: var(--ink3);
  padding: 0.2rem 0;
  max-width: 45%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pulled-nav-btn:hover { color: var(--ink); }

.lex-pulled::after {  /* 底部穿杆圆孔 */
  content: '';
  position: absolute;
  bottom: 0.9rem; left: 50%;
  transform: translateX(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--rule);
}

/* ═══════════════════════════════════════════
   移动端（断点沿用站内 600）
═══════════════════════════════════════════ */
@media (max-width: 600px) {
  body { padding: 1.4rem 0.7rem 3rem; }
  .lex-title { font-size: 1.4rem; }
  .drawer-face {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    row-gap: 0.2rem;
    column-gap: 1rem;
    padding: 0.9rem 1rem;
  }
  .face-cat  { grid-column: 1; grid-row: 1; font-size: 1.05rem; }
  .face-meta { grid-column: 1; grid-row: 2; }
  .face-spacer { display: none; }
  .drawer-pull { grid-column: 2; grid-row: 1 / span 2; justify-self: end; }
  .tray-in { padding: 1.3rem 0.7rem 0; }
  .tray-rod { margin: 0 -0.7rem; }
  .lex-pulled { padding: 1.5rem 1.2rem 3rem; }
  .pulled-term { font-size: 1.25rem; }
  .lex-overlay { padding: 1.6rem 0.7rem 3rem; }
}
</style>
</head>
<body>

<header class="lex-head">
  <a class="lex-back" href="../index.html#world">&larr; ARCHIVE</a>
  <div class="lex-title-row">
    <h1 class="lex-title">设定词条馆</h1>
    <span class="lex-title-en">LEXICON</span>
  </div>
  <div class="lex-sub">研究所内部术语手册 · 非涉密摘录版</div>
</header>

<div class="cabinet" id="cabinet">
  <div class="cabinet-plate"><span>LEXICON · CARD CATALOG</span><button class="plate-find" id="lex-find-toggle" aria-expanded="false">查卡 ⌕</button><span class="r">目录柜 No.03</span></div>
  <div class="cabinet-search-wrap" id="lex-search-wrap"><div class="cabinet-search-clip">
    <div class="cabinet-search"><label for="lex-q">检索 INDEX</label><input id="lex-q" type="text" autocomplete="off" placeholder="输入词条名或关键字…"></div>
  </div></div>
  <!-- JS 渲染各分类抽屉 -->
</div>

<div class="lex-foot">馆藏编号以入柜顺序为准 · 缺号为待归档词条</div>

<div class="lex-overlay" id="lex-overlay">
  <div class="lex-pulled" id="lex-pulled" role="dialog" aria-modal="true"><!-- JS 渲染 --></div>
</div>

<script src="lexicon-data.js"></script>
<script>
(function () {
  const cabinet = document.getElementById('cabinet');
  const overlay = document.getElementById('lex-overlay');
  const pulled  = document.getElementById('lex-pulled');

  const numOf = i => 'LEX-' + String(i + 1).padStart(3, '0');
  const byId  = {};
  LEX_ENTRIES.forEach((e, i) => { byId[e.id] = { entry: e, num: numOf(i) }; });

  /* ── 渲染：每个分类一只抽屉 ── */
  const drawerByCat = {};
  LEX_CATS.forEach(cat => {
    const items = LEX_ENTRIES.map((e, i) => ({ e, i }))
      .filter(({ e }) => e.cat === cat.key);
    if (!items.length) return;
    const liveCount  = items.filter(({ e }) => !e.draft).length;
    const draftCount = items.length - liveCount;

    const d = document.createElement('div');
    d.className = 'drawer';
    d.innerHTML =
      '<div class="drawer-tray"><div class="tray-clip"><div class="tray-in">' +
        items.map(({ e, i }) => e.draft
          ? '<button class="lex-card draft" disabled aria-disabled="true">' +
              '<span class="lex-card-term">' + e.term + '</span>' +
              '<span class="lex-card-tag">待归档</span>' +
              '<span class="lex-card-num">' + numOf(i) + '</span>' +
            '</button>'
          : '<button class="lex-card" data-id="' + e.id + '">' +
              '<span class="lex-card-term">' + e.term + '</span>' +
              '<span class="lex-card-num">' + numOf(i) + '</span>' +
            '</button>'
        ).join('') +
        '<div class="tray-rod"></div>' +
      '</div></div></div>' +
      '<button class="drawer-face" aria-expanded="false">' +
        '<span class="face-cat">' + cat.label + '</span>' +
        '<span class="face-meta">' + cat.key.toUpperCase() + ' · ' + liveCount + ' 张' + (draftCount ? ' · ' + draftCount + ' 待归档' : '') + '</span>' +
        '<span class="face-spacer" aria-hidden="true"></span>' +
        '<span class="drawer-pull" aria-hidden="true"></span>' +
      '</button>';

    const face = d.querySelector('.drawer-face');
    face.addEventListener('click', () => {
      const open = d.classList.toggle('open');
      face.setAttribute('aria-expanded', open);
    });
    const cards = Array.from(d.querySelectorAll('.lex-card'));
    cards.forEach((btn, ci) => {
      const rec = byId[btn.dataset.id];
      const e2 = rec ? rec.entry : items[ci].e;
      btn.dataset.q = (e2.term + ' ' + (e2.sub || '') + ' ' + (e2.def || '')).toLowerCase();
      if (!btn.dataset.id) return;
      btn.addEventListener('click', () => { location.hash = btn.dataset.id; });
      btn.addEventListener('keydown', ev => {  // 卡堆内上下键移动
        if (ev.key !== 'ArrowDown' && ev.key !== 'ArrowUp') return;
        ev.preventDefault();
        const live = cards.filter(c => c.dataset.id);
        const j = live.indexOf(btn) + (ev.key === 'ArrowDown' ? 1 : -1);
        if (live[j]) live[j].focus();
      });
    });

    cabinet.appendChild(d);
    drawerByCat[cat.key] = d;
  });

  function openDrawerFor(catKey, instant) {
    const d = drawerByCat[catKey];
    if (!d || d.classList.contains('open')) return;
    if (instant) d.classList.add('no-anim');
    d.classList.add('open');
    d.querySelector('.drawer-face').setAttribute('aria-expanded', 'true');
    if (instant) requestAnimationFrame(() => d.classList.remove('no-anim'));
  }

  /* ── 柜内检索 ── */
  const q = document.getElementById('lex-q');
  const findToggle = document.getElementById('lex-find-toggle');
  const searchWrap = document.getElementById('lex-search-wrap');
  findToggle.addEventListener('click', () => {
    const open = searchWrap.classList.toggle('show');
    findToggle.classList.toggle('on', open);
    findToggle.setAttribute('aria-expanded', open);
    if (open) setTimeout(() => q.focus(), 360);
    else if (q.value) { q.value = ''; q.dispatchEvent(new Event('input')); }
  });
  let preSearchOpen = null;
  q.addEventListener('input', () => {
    const v = q.value.trim().toLowerCase();
    const drawers = Object.values(drawerByCat);
    if (v && preSearchOpen === null) preSearchOpen = drawers.filter(d => d.classList.contains('open'));
    drawers.forEach(d => {
      const cards = Array.from(d.querySelectorAll('.lex-card'));
      let hit = 0;
      cards.forEach(c => {
        const ok = !v || c.dataset.q.includes(v);
        c.classList.toggle('dim', !ok);
        if (ok && v) hit++;
      });
      if (v) {
        d.classList.toggle('mute', !hit);
        setDrawer(d, hit > 0);
      } else {
        d.classList.remove('mute');
        setDrawer(d, preSearchOpen ? preSearchOpen.includes(d) : d.classList.contains('open'));
      }
    });
    if (!v) preSearchOpen = null;
  });
  function setDrawer(d, open) {
    d.classList.toggle('open', open);
    d.querySelector('.drawer-face').setAttribute('aria-expanded', open);
  }

  /* ── 抽出态 ── */
  let currentId = null, swapping = false;
  function neighborsOf(id) {
    const e = byId[id].entry;
    const sib = LEX_ENTRIES.filter(x => x.cat === e.cat && !x.draft);
    const k = sib.findIndex(x => x.id === id);
    return { prev: sib[k - 1] || null, next: sib[k + 1] || null };
  }
  function navTo(id) {  // 换卡仪式：先插回，再抽出
    if (swapping || !byId[id]) return;
    swapping = true;
    pulled.classList.add('swap-out');
    setTimeout(() => {
      pulled.classList.remove('swap-out');
      location.hash = id;
      pulled.classList.add('swap-in');
      overlay.scrollTop = 0;
      setTimeout(() => { pulled.classList.remove('swap-in'); swapping = false; }, 320);
    }, 190);
  }
  function renderPulled(id) {
    const rec = byId[id];
    if (!rec) return false;
    const e = rec.entry;

    let seeHtml = '';
    if (e.see && e.see.length) {
      seeHtml = '<div class="pulled-see"><span>参见 SEE ALSO</span>' +
        e.see.map(sid => {
          const t = byId[sid];
          if (t && !t.entry.draft) {
            return '<button class="pulled-see-link" data-see="' + sid + '">' + t.entry.term + '</button>';
          }
          const name = t ? t.entry.term : sid;
          return '<span class="pulled-see-dead">' + name + '（待归档）</span>';
        }).join('') +
        '</div>';
    }

    pulled.innerHTML =
      '<button class="pulled-close" aria-label="放回卡片">&times;</button>' +
      '<div class="pulled-num">' + rec.num + '</div>' +
      '<div class="pulled-head">' +
        '<div><span class="pulled-term">' + e.term + '</span>' +
          (e.sub ? ' <span class="pulled-sub">' + e.sub + '</span>' : '') +
        '</div>' +
        '<span class="pulled-stamp">' + (LEX_CATS.find(c => c.key === e.cat) || {}).label + '</span>' +
      '</div>' +
      '<div class="pulled-body">' +
        '<div class="pulled-def">' + e.def + '</div>' +
        (e.note ? '<div class="pulled-note">' + e.note + '</div>' : '') +
      '</div>' +
      seeHtml;

    const nb = neighborsOf(id);
    if (nb.prev || nb.next) {
      pulled.innerHTML +=
        '<div class="pulled-nav">' +
          (nb.prev ? '<button class="pulled-nav-btn" data-nav="' + nb.prev.id + '">&larr; ' + nb.prev.term + '</button>' : '<span></span>') +
          (nb.next ? '<button class="pulled-nav-btn" data-nav="' + nb.next.id + '">' + nb.next.term + ' &rarr;</button>' : '<span></span>') +
        '</div>';
    }

    currentId = id;
    pulled.querySelector('.pulled-close').addEventListener('click', closeEntry);
    pulled.querySelectorAll('.pulled-see-link').forEach(b => {
      b.addEventListener('click', () => navTo(b.dataset.see));
    });
    pulled.querySelectorAll('.pulled-nav-btn').forEach(b => {
      b.addEventListener('click', () => navTo(b.dataset.nav));
    });
    return true;
  }

  function closeEntry() {
    history.replaceState(null, '', location.pathname + location.search);
    applyHash(false);
  }
  overlay.addEventListener('click', ev => { if (ev.target === overlay) closeEntry(); });
  document.addEventListener('keydown', ev => {
    if (!overlay.classList.contains('show')) return;
    if (ev.key === 'Escape') { closeEntry(); return; }
    if (ev.key === 'ArrowLeft' || ev.key === 'ArrowRight') {
      const nb = currentId ? neighborsOf(currentId) : {};
      const t = ev.key === 'ArrowLeft' ? nb.prev : nb.next;
      if (t) navTo(t.id);
    }
  });

  /* ── hash 驱动 ── */
  function applyHash(initial) {
    const id = decodeURIComponent(location.hash.replace(/^#/, ''));
    const rec = byId[id];
    if (rec && !rec.entry.draft) {
      openDrawerFor(rec.entry.cat, initial);  // 深链直达：跳过拉抽屉仪式
      renderPulled(id);
      overlay.classList.add('show');
      overlay.scrollTop = 0;
      document.body.classList.add('locked');
    } else {
      overlay.classList.remove('show');
      document.body.classList.remove('locked');
    }
  }
  window.addEventListener('hashchange', () => applyHash(false));
  applyHash(true);

  console.log('%c[馆员] 抽完的卡片请按原位放回。', 'color:#8a6c2a;font-family:monospace');
})();
</script>
</body>
</html>
